@if (isEmpty) {
  <div class="empty-state">
    <mat-icon class="empty-state__icon">{{ emptyIcon }}</mat-icon>
    <p class="empty-state__message">{{ emptyMessage }}</p>
  </div>
} @else {
  <div class="table-container">
    <table
      mat-table
      [dataSource]="data"
      [trackBy]="trackByFn"
      matSort
      (matSortChange)="onSortChange($event)"
      class="reusable-table"
    >
      @for (column of columns; track column.key) {
        <ng-container [matColumnDef]="column.key">
          <th
            mat-header-cell
            *matHeaderCellDef
            [mat-sort-header]="column.key"
            [disabled]="!sortable || !column.sortable"
            [style.text-align]="getTextAlign(column)"
          >
            {{ column.header }}
          </th>
          <td
            mat-cell
            *matCellDef="let row"
            [style.text-align]="getTextAlign(column)"
          >
            @if (getCellTemplate(column.key); as cellDef) {
              <ng-container
                *ngTemplateOutlet="cellDef.templateRef; context: { $implicit: row }"
              ></ng-container>
            } @else {
              {{ getCellValue(row, column.key) }}
            }
          </td>
        </ng-container>
      }

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns"
        [class.row--clickable]="rowClickable"
        [attr.tabindex]="rowClickable ? 0 : null"
        [attr.role]="rowClickable ? 'button' : null"
        [attr.aria-label]="rowClickable ? 'View details' : null"
        (click)="onRowClick(row)"
        (keydown)="onRowKeydown($event, row)"
      ></tr>
    </table>
  </div>

  @if (paginator) {
    <mat-paginator
      [length]="totalElements"
      [pageSize]="pageSize"
      [pageIndex]="pageIndex"
      [pageSizeOptions]="[10, 20, 50]"
      (page)="onPageChange($event)"
      aria-label="Select page"
    ></mat-paginator>
  }
}
