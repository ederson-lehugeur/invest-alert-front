@if (totalPages > 1) {
  <nav class="pagination" aria-label="Pagination">
    <button
      class="pagination__button"
      [disabled]="isFirstPage"
      (click)="goToPrevious()"
      aria-label="Previous page"
    >
      Previous
    </button>

    <span class="pagination__info">
      Page {{ page + 1 }} of {{ totalPages }}
    </span>

    <button
      class="pagination__button"
      [disabled]="isLastPage"
      (click)="goToNext()"
      aria-label="Next page"
    >
      Next
    </button>
  </nav>
}
