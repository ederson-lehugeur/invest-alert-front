<div class="rules-page">
  <div class="rules-page__header">
    <h1 class="mat-headline-medium">Rules</h1>
    <button mat-flat-button color="primary" (click)="openCreateDialog()" aria-label="Create new rule">
      <mat-icon>add</mat-icon>
      Create Rule
    </button>
  </div>

  <app-error-message [message]="(facade.error$ | async) ?? null" />

  <!-- Individual Rules Section -->
  <section class="rules-page__section">
    <h2 class="mat-title-large">Individual Rules</h2>

    @if (facade.isLoading$ | async) {
      <app-skeleton-loader variant="table-row" [count]="5" />
    } @else {
      <app-reusable-table
        [columns]="rulesColumns"
        [data]="rulesData"
        [trackByFn]="trackRuleById"
        emptyIcon="rule"
        emptyMessage="No individual rules found."
      >
        <ng-template appCellDef="active" let-row>
          <mat-icon [class]="row.active ? 'icon--positive' : 'icon--neutral'">
            {{ row.active ? 'check_circle' : 'cancel' }}
          </mat-icon>
        </ng-template>

        <ng-template appCellDef="actions" let-row>
          @if (!row.triggered) {
            <div class="actions-cell">
              <button
                mat-icon-button
                (click)="openEditDialog(row)"
                [attr.aria-label]="'Edit rule for ' + row.ticker"
              >
                <mat-icon>edit</mat-icon>
              </button>
              <button
                mat-icon-button
                color="warn"
                (click)="confirmDelete(row)"
                [attr.aria-label]="'Delete rule for ' + row.ticker"
              >
                <mat-icon>delete</mat-icon>
              </button>
            </div>
          } @else {
            <span class="triggered-badge">Triggered</span>
          }
        </ng-template>
      </app-reusable-table>
    }
  </section>

  <!-- Rule Groups Section -->
  <section class="rules-page__section">
    <div class="rules-page__section-header">
      <h2 class="mat-title-large">Rule Groups</h2>
      <button mat-flat-button color="primary"
              (click)="openCreateRuleGroupDialog()"
              aria-label="Create new rule group">
        <mat-icon>add</mat-icon>
        Create Rule Group
      </button>
    </div>

    @if (facade.isLoading$ | async) {
      <app-skeleton-loader variant="table-row" [count]="3" />
    } @else {
      <app-reusable-table
        [columns]="ruleGroupsColumns"
        [data]="ruleGroupsData"
        [trackByFn]="trackGroupById"
        emptyIcon="folder_open"
        emptyMessage="No rule groups found."
      />
    }
  </section>
</div>
