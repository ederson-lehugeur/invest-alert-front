<div class="alerts-page">
  <h1 class="alerts-page__title">Alerts</h1>

  <app-error-message [message]="(facade.error$ | async) ?? null" />

  <div class="alerts-page__filters">
    <mat-form-field appearance="outline" class="alerts-page__filter-field">
      <mat-label>Ticker</mat-label>
      <input
        matInput
        [(ngModel)]="filterTicker"
        (keyup.enter)="onFilterChange()"
        placeholder="Filter by ticker"
        aria-label="Filter by ticker"
      />
    </mat-form-field>

    <mat-form-field appearance="outline" class="alerts-page__filter-field">
      <mat-label>Status</mat-label>
      <mat-select
        [(ngModel)]="filterStatus"
        (selectionChange)="onFilterChange()"
        aria-label="Filter by status"
      >
        <mat-option value="">All</mat-option>
        <mat-option value="PENDING">PENDING</mat-option>
        <mat-option value="SENT">SENT</mat-option>
      </mat-select>
    </mat-form-field>

    <button mat-flat-button color="primary" (click)="onFilterChange()" type="button">
      Filter
    </button>
  </div>

  @if (facade.isLoading$ | async) {
    <app-skeleton-loader variant="table-row" [count]="5" />
  } @else {
    <app-reusable-table
      [columns]="columns"
      [data]="alertData"
      [paginator]="true"
      [pageSize]="currentSize"
      [pageIndex]="currentPage"
      [totalElements]="totalElements"
      [trackByFn]="trackById"
      emptyIcon="notifications_off"
      emptyMessage="No alerts match the current filters."
      (pageChange)="onPageChange($event)"
    >
      <ng-template appCellDef="status" let-row>
        <mat-chip
          [class.chip--sent]="row.status === 'SENT'"
          [class.chip--pending]="row.status === 'PENDING'"
          disableRipple
        >
          {{ row.status }}
        </mat-chip>
      </ng-template>

      <ng-template appCellDef="createdAt" let-row>
        {{ row.createdAt | date:'dd/MM/yyyy HH:mm:ss' }}
      </ng-template>

      <ng-template appCellDef="sentAt" let-row>
        {{ row.sentAt ? (row.sentAt | date:'dd/MM/yyyy HH:mm:ss') : '-' }}
      </ng-template>
    </app-reusable-table>
  }
</div>
