<div class="login-page">
  <div class="login-card">
    <h1 class="login-card__title">Sign In</h1>

    <app-error-message [message]="authFacade.error()" />

    @if (authFacade.loading()) {
      <app-loading-indicator />
    }

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form" novalidate>
      <div class="form-field">
        <label for="email" class="form-field__label">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="form-field__input"
          autocomplete="email"
        />
        @if (submitted() && loginForm.controls.email.hasError('required')) {
          <span class="form-field__error" role="alert">Email is required.</span>
        }
      </div>

      <div class="form-field">
        <label for="password" class="form-field__label">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="form-field__input"
          autocomplete="current-password"
        />
        @if (submitted() && loginForm.controls.password.hasError('required')) {
          <span class="form-field__error" role="alert">Password is required.</span>
        }
      </div>

      <button
        type="submit"
        class="login-form__submit"
        [disabled]="authFacade.loading()"
      >
        Sign In
      </button>
    </form>

    <p class="login-card__footer">
      Don't have an account? <a routerLink="/auth/register">Register</a>
    </p>
  </div>
</div>
